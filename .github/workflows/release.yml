name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Download sidecar binaries (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          # yt-dlp
          curl -L -o src-tauri/binaries/yt-dlp-x86_64-pc-windows-msvc.exe \
            https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe
          # ffmpeg + ffprobe from gyan.dev (release essentials)
          curl -L -o ffmpeg.zip \
            https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip
          7z x ffmpeg.zip -offmpeg_tmp -y
          cp ffmpeg_tmp/ffmpeg-*-essentials_build/bin/ffmpeg.exe \
            src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe
          cp ffmpeg_tmp/ffmpeg-*-essentials_build/bin/ffprobe.exe \
            src-tauri/binaries/ffprobe-x86_64-pc-windows-msvc.exe
          rm -rf ffmpeg.zip ffmpeg_tmp
          ls -la src-tauri/binaries/

      - run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "v__VERSION__"
          releaseBody: "See the assets for the installer."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
